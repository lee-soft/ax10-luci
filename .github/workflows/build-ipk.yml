name: build-ipk (luci-stack from source via newstack)

# Builds luci-stack.tar.gz from source (rpcd/uhttpd/rpcd-mod-luci/json-c/luci-bwc) inside the
# newstack toolchain image, stages it into the package alongside the (still-vendored) luci-dist
# tree, packs the .ipk, and publishes it to this repo's "ipk" release. The luci-stack binaries
# are build outputs and are NOT committed. (luci-dist from-source is phase 2.)

on:
  push:
    paths: ['control', 'postinst', 'prerm', 'build/**', 'pack.sh', 'data/opt/ax10-luci/luci-setup.sh', '.github/workflows/build-ipk.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/lee-soft/newstack:latest      # glibc-2.26 ARM cross toolchain on PATH
    steps:
      - uses: actions/checkout@v4
      - name: Build luci-stack from source
        run: sh build/build.sh
      - name: Stage the built luci-stack into the package + pack .ipk
        run: |
          cp build/out/luci-stack.tar.gz data/opt/ax10-luci/luci-stack.tar.gz
          sh pack.sh
          ls -l dist
      - uses: actions/upload-artifact@v4
        with:
          name: ipk
          path: dist/*.ipk

  publish:
    needs: build
    runs-on: ubuntu-latest      # normal runner (has gh CLI); container has no gh
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ipk
          path: dist
      - name: Publish .ipk to the 'ipk' release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create ipk dist/*.ipk --title "opkg package (.ipk)" --notes "luci-stack built from source via newstack; luci-dist vendored (phase 2)." \
            || gh release upload ipk dist/*.ipk --clobber
